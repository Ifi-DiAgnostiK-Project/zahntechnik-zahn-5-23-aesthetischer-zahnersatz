name: Build LiaScript Assets

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: liascript-assets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-assets:
    runs-on: ubuntu-latest
    env:
      COURSE_FILE: README.md
      BUILD_ROOT: /tmp/liascript-builds
      OUTPUT_DIR: /tmp/liascript-assets
      RELEASE_TAG: latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install LiaScript Exporter
        run: npm install -g @liascript/exporter

      - name: Generate LiaScript exports
        run: |
          set -euo pipefail
          rm -rf "${BUILD_ROOT}" "${OUTPUT_DIR}"
          mkdir -p "${BUILD_ROOT}" "${OUTPUT_DIR}"

          prepare_course() {
            local name="$1"
            local course_dir="${BUILD_ROOT}/${name}"
            rm -rf "${course_dir}"
            mkdir -p "${course_dir}"
            git archive HEAD | tar -x -C "${course_dir}"
            echo "${course_dir}"
          }

          course_dir="$(prepare_course scorm12)"
          liaex -i "${course_dir}/${COURSE_FILE}" --format scorm1.2 --output "${OUTPUT_DIR}/scorm12"

          course_dir="$(prepare_course scorm2004)"
          liaex -i "${course_dir}/${COURSE_FILE}" --format scorm2004 --output "${OUTPUT_DIR}/scorm2004"

          course_dir="$(prepare_course ims)"
          liaex -i "${course_dir}/${COURSE_FILE}" --format ims --output "${OUTPUT_DIR}/ims"

          course_dir="$(prepare_course xapi)"
          liaex -i "${course_dir}/${COURSE_FILE}" --format xapi --xapi-zip --output "${OUTPUT_DIR}/xapi"

          course_dir="$(prepare_course pdf)"
          liaex -i "${course_dir}/${COURSE_FILE}" --format pdf --output "${OUTPUT_DIR}/course" --pdf-timeout 50000

          ls -lh "${OUTPUT_DIR}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: liascript-assets
          path: |
            ${{ env.OUTPUT_DIR }}/scorm12.zip
            ${{ env.OUTPUT_DIR }}/scorm2004.zip
            ${{ env.OUTPUT_DIR }}/ims.zip
            ${{ env.OUTPUT_DIR }}/xapi.zip
            ${{ env.OUTPUT_DIR }}/course.pdf
          if-no-files-found: error

      - name: Publish latest release asset
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${RELEASE_TAG}" "${GITHUB_SHA}"
          git push --force origin "refs/tags/${RELEASE_TAG}"

          assets=(
            "${OUTPUT_DIR}/scorm12.zip"
            "${OUTPUT_DIR}/scorm2004.zip"
            "${OUTPUT_DIR}/ims.zip"
            "${OUTPUT_DIR}/xapi.zip"
            "${OUTPUT_DIR}/course.pdf"
          )

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
            gh release delete-asset "${RELEASE_TAG}" "${GITHUB_REPOSITORY#*/}-liascript-assets.zip" -y || true
          else
            gh release create "${RELEASE_TAG}" "${assets[@]}" \
              --title "Latest LiaScript assets" \
              --notes "Automatisch gebaut aus README.md: PDF, SCORM 1.2, SCORM 2004, IMS und xAPI."
          fi
